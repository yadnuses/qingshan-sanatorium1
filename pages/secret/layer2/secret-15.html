<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>员工档案 | 青山疗养院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SimSun", "宋体", serif;
            background: #d4c4a8;
            min-height: 100vh;
            padding: 20px;
            color: #3d3d3d;
        }
        .archive-container {
            max-width: 700px;
            margin: 0 auto;
            background: #f5e6c8;
            border: 1px solid #b8a888;
            box-shadow: 0 0 20px rgba(0,0,0,0.2), inset 0 0 60px rgba(139,119,89,0.1);
            padding: 40px;
            position: relative;
        }
        .archive-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .archive-header {
            text-align: center;
            border-bottom: 2px solid #8b7355;
            padding-bottom: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .archive-header h1 {
            font-size: 24px;
            color: #5c4a32;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .archive-code {
            font-size: 12px;
            color: #8b7355;
            font-family: monospace;
        }
        .archive-stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: 3px solid #c41e3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c41e3a;
            font-size: 14px;
            font-weight: bold;
            transform: rotate(-15deg);
            opacity: 0.6;
        }
        .archive-content {
            position: relative;
            z-index: 1;
        }
        .section {
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 14px;
            color: #8b7355;
            border-bottom: 1px dashed #b8a888;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .info-row {
            display: flex;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .info-label {
            width: 100px;
            color: #666;
        }
        .info-value {
            flex: 1;
            border-bottom: 1px solid #b8a888;
            padding-left: 10px;
            color: #3d3d3d;
        }
        .timeline {
            margin-top: 15px;
        }
        .timeline-item {
            display: flex;
            margin-bottom: 12px;
            font-size: 14px;
        }
        .timeline-year {
            width: 80px;
            color: #8b7355;
            font-weight: bold;
        }
        .timeline-content {
            flex: 1;
            color: #3d3d3a;
            padding-left: 10px;
            border-left: 2px solid #c9a86c;
        }
        .confidential-section {
            margin-top: 20px;
            padding: 20px;
            background: rgba(196,30,58,0.05);
            border: 1px solid #c9a86c;
            position: relative;
        }
        .confidential-section::before {
            content: '保密级别：高';
            position: absolute;
            top: -10px;
            left: 15px;
            background: #f5e6c8;
            padding: 0 10px;
            font-size: 12px;
            color: #c41e3a;
        }
        .confidential-content {
            font-size: 14px;
            line-height: 2;
            color: #5a3d0a;
        }
        .death-record {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.05);
            border-left: 3px solid #333;
        }
        .death-record .date {
            font-weight: bold;
            color: #333;
        }
        .death-record .cause {
            color: #666;
            font-style: italic;
        }
        .back-btn {
            display: block;
            width: 150px;
            margin: 30px auto 0;
            padding: 10px;
            background: #8b7355;
            color: #f5e6c8;
            text-align: center;
            text-decoration: none;
            position: relative;
            z-index: 1;
        }
        .back-btn:hover {
            background: #6b5345;
        }
        .page-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #8b7355;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="archive-container">
        <div class="archive-stamp">机密</div>

        <div class="archive-header">
            <h1>员工档案</h1>
            <div class="archive-code">档案编号：S-1985-001 | 层级：2</div>
        </div>

        <div class="archive-content">
            <div class="section">
                <div class="section-title">基础信息</div>
                <div class="info-row">
                    <span class="info-label">姓名</span>
                    <span class="info-value">张德贵</span>
                </div>
                <div class="info-row">
                    <span class="info-label">性别</span>
                    <span class="info-value">男</span>
                </div>
                <div class="info-row">
                    <span class="info-label">年龄</span>
                    <span class="info-value">62岁</span>
                </div>
                <div class="info-row">
                    <span class="info-label">入职时间</span>
                    <span class="info-value">1985年</span>
                </div>
            </div>

            <div class="section">
                <div class="section-title">工作经历</div>
                <div class="timeline">
                    <div class="timeline-item">
                        <span class="timeline-year">1985年</span>
                        <span class="timeline-content">入职青山疗养院（建院之初）</span>
                    </div>
                    <div class="timeline-item">
                        <span class="timeline-year">1985-1990</span>
                        <span class="timeline-content">参与地下三层"特殊项目"安保工作</span>
                    </div>
                    <div class="timeline-item">
                        <span class="timeline-year">1990年后</span>
                        <span class="timeline-content">转任门卫</span>
                    </div>
                </div>
            </div>

            <div class="confidential-section">
                <div class="confidential-content">
                    老张是"长生会"早期成员。1985年，他参与了疗养院的建立。
                    <br><br>
                    但在1990年，他因"良心发现"而退出核心圈子，被贬为门卫，负责看守大门。
                </div>
            </div>

            <div class="section">
                <div class="section-title">近期情况</div>
                <div class="timeline">
                    <div class="timeline-item">
                        <span class="timeline-year">3月15日</span>
                        <span class="timeline-content">老张找到陈婉，告诉她一些"不该知道的事"</span>
                    </div>
                </div>
                <div class="death-record">
                    <span class="date">1998年3月18日</span>
                    <p class="cause">老张被发现死在家中，警方判定为"意外"</p>
                </div>
            </div>
        </div>

        <a href="../../../main.html" class="back-btn">返回首页</a>
    </div>

    <div class="page-footer">
        页面 15 / 50 | © 1998 YADNUS
    </div>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
    <script src="../../../js/utils.js"></script>
    <script>
        if (window.ProgressManager) ProgressManager.addUnlockedPage('15');
    </script>
</body>
</html>
