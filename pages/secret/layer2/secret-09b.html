<!DOCTYPE html>

<head>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {

            background: #d4c4a8;
            min-height: 100vh;
            padding: 20px;
            color: #3d3d3d;
        }
        .archive-container {
            max-width: 700px;
            margin: 0 auto;
            background: #f5e6c8;
            border: 1px solid #b8a888;
            box-shadow: 0 0 20px rgba(0,0,0,0.2), inset 0 0 60px rgba(139,119,89,0.1);
            padding: 40px;
            position: relative;
        }
        .archive-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");

        .archive-header {
            text-align: center;
            border-bottom: 2px solid #8b7355;
            padding-bottom: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .archive-header h1 {
            font-size: 24px;
            color: #5c4a32;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .archive-code {
            font-size: 12px;
            color: #8b7355;
            font-family: monospace;
        }
        .archive-stamp {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 80px;
            height: 80px;
            border: 3px solid #c41e3a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c41e3a;
            font-size: 14px;
            font-weight: bold;
            transform: rotate(-15deg);
            opacity: 0.6;
        }
        .archive-content {
            position: relative;
            z-index: 1;
        }
        .year-section {
            margin-bottom: 25px;
        }
        .year-title {
            font-size: 16px;
            color: #5c4a32;
            font-weight: bold;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #b8a888;
        }
        .record-item {
            display: flex;
            margin-bottom: 8px;
            font-size: 14px;
            line-height: 1.8;
        }
        .record-label {
            width: 120px;
            color: #666;
        }
        .record-value {
            flex: 1;
            color: #3d3d3d;
        }
        .abnormal-section {
            margin-top: 20px;
            padding: 15px;
            background: rgba(196,30,58,0.05);
            border: 1px dashed #c41e3a;
        }
        .abnormal-mark {
            font-family: "KaiTi", "楷体", "STKaiti", serif;
            font-size: 16px;
            font-style: italic;
            color: #c41e3a;
            margin-bottom: 15px;
            text-align: center;
        }
        .abnormal-item {
            font-size: 14px;
            color: #8b4513;
            margin-bottom: 8px;
            padding-left: 10px;
            border-left: 2px solid #c41e3a;
        }
        .opinion-section {
            margin-top: 25px;
            padding: 15px;
            background: rgba(139,119,89,0.1);
        }
        .opinion-title {
            font-size: 14px;
            color: #5c4a32;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .opinion-content {
            font-size: 14px;
            color: #3d3d3d;
            line-height: 1.8;
        }
        .back-btn {
            display: block;
            width: 150px;
            margin: 30px auto 0;
            padding: 10px;
            background: #8b7355;
            color: #f5e6c8;
            text-align: center;
            text-decoration: none;
            position: relative;
            z-index: 1;
        }
        .back-btn:hover {
            background: #6b5345;
        }
        .page-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #8b7355;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>

        <a href="../../../main.html" class="back-btn">返回首页</a>
