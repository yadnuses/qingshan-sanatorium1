<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>药房记录 | 青山疗养院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SimSun", "宋体", monospace;
            background: #f0f0f0;
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .record-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border: 2px solid #333;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            padding: 30px;
        }
        .record-header {
            text-align: center;
            border-bottom: 3px double #333;
            padding-bottom: 20px;
            margin-bottom: 25px;
        }
        .record-header h1 {
            font-size: 22px;
            letter-spacing: 10px;
            margin-bottom: 10px;
        }
        .record-code {
            font-size: 12px;
            color: #666;
            font-family: monospace;
        }
        .confidential-banner {
            background: #c41e3a;
            color: white;
            text-align: center;
            padding: 8px;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 5px;
            margin-bottom: 25px;
        }
        .section-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 8px 12px;
            background: #e0e0e0;
            border-left: 4px solid #333;
        }
        .info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .info-table th,
        .info-table td {
            border: 1px solid #999;
            padding: 12px;
            text-align: left;
        }
        .info-table th {
            background: #f0f0f0;
            width: 150px;
            font-weight: bold;
        }
        .deleted {
            background: #333;
            color: #333;
            padding: 2px 8px;
        }
        .note-section {
            margin-top: 20px;
            padding: 20px;
            background: #f9f9f9;
            border: 1px solid #ddd;
        }
        .note-content {
            font-size: 14px;
            line-height: 2;
            color: #333;
        }
        .file-reference {
            margin-top: 25px;
            padding: 15px;
            background: #fff3e0;
            border: 1px solid #ff9800;
        }
        .file-title {
            font-size: 14px;
            font-weight: bold;
            color: #e65100;
            margin-bottom: 10px;
        }
        .file-info {
            font-size: 13px;
            line-height: 1.8;
            color: #5d4037;
        }
        .back-btn {
            display: block;
            width: 150px;
            margin: 30px auto 0;
            padding: 10px;
            background: #666;
            color: white;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
        }
        .back-btn:hover {
            background: #444;
        }
        .page-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="record-container">
        <div class="record-header">
            <h1>特 殊 药 品 登 记 表</h1>
            <div class="record-code">档案编号：P-1998-000 | 层级：2</div>
        </div>

        <div class="confidential-banner">
            保 密 药 品 · 限 内 部 查 阅
        </div>

        <div class="section-title">药品基本信息</div>
        <table class="info-table">
            <tr>
                <th>药品编号</th>
                <td>SY-000</td>
            </tr>
            <tr>
                <th>药品名称</th>
                <td><span class="deleted">[数据删除]</span></td>
            </tr>
            <tr>
                <th>药品类别</th>
                <td>实验性药物</td>
            </tr>
            <tr>
                <th>用途</th>
                <td><span class="deleted">[数据删除]</span></td>
            </tr>
            <tr>
                <th>存储位置</th>
                <td>地下三层实验室</td>
            </tr>
            <tr>
                <th>研制日期</th>
                <td>1985年</td>
            </tr>
        </table>

        <div class="section-title">备注说明</div>
        <div class="note-section">
            <div class="note-content">
                SY-000是所有SY系列药品的原型。它是在1985年研制成功的，是"永生计划"的核心药物。
            </div>
        </div>

        <div class="file-reference">
            <div class="file-title">相关文件</div>
            <div class="file-info">
                <strong>《永生计划技术文档》</strong><br>
                存储位置：地下三层解密区域<br>
                访问权限：院长、项目负责人
            </div>
        </div>

        <a href="../../../main.html" class="back-btn">返回首页</a>
    </div>

    <div class="page-footer">
        页面 16 / 50 | © 1998 YADNUS
    </div>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
    <script src="../../../js/utils.js"></script>
    <script>
        if (window.ProgressManager) ProgressManager.addUnlockedPage('16');
    </script>
</body>
</html>
