<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>杭州 | 青山疗养院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --forest-green: #3d7c55;
            --bg-dark: #121212;
            --cream: #e8e4dc;
            --accent-gold: #c9a227;
            --vinyl-black: #1a1a1a;
        }

        body {
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            color: var(--cream);
            position: relative;
            overflow-x: hidden;
        }

        /* 对角线背景 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                linear-gradient(135deg, transparent 48%, rgba(61, 124, 85, 0.15) 48%, rgba(61, 124, 85, 0.15) 52%, transparent 52%),
                linear-gradient(45deg, transparent 48%, rgba(201, 162, 39, 0.08) 48%, rgba(201, 162, 39, 0.08) 52%, transparent 52%);
            background-size: 150px 150px, 250px 250px;
            pointer-events: none;
            z-index: 0;
        }

        /* 强烈对角线 */
        .diagonal-tension {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .diagonal-tension::before {
            content: '';
            position: absolute;
            top: -30%;
            left: -10%;
            width: 150%;
            height: 15px;
            background: var(--forest-green);
            transform: rotate(-25deg);
            opacity: 0.6;
        }

        .diagonal-tension::after {
            content: '';
            position: absolute;
            top: 60%;
            right: -20%;
            width: 150%;
            height: 6px;
            background: var(--accent-gold);
            transform: rotate(-25deg);
            opacity: 0.4;
        }

        /* 音符装饰 */
        .music-note {
            position: fixed;
            font-size: 40px;
            color: var(--forest-green);
            opacity: 0.1;
            z-index: 1;
            animation: float 6s ease-in-out infinite;
        }

        .music-note:nth-child(1) { top: 10%; left: 5%; animation-delay: 0s; }
        .music-note:nth-child(2) { top: 70%; right: 8%; animation-delay: 2s; }
        .music-note:nth-child(3) { bottom: 20%; left: 10%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 800px;
            margin: 0 auto;
            padding: 60px 30px;
            text-align: center;
        }

        /* 标题 */
        .discovery-title {
            font-size: 18px;
            letter-spacing: 8px;
            color: var(--accent-gold);
            margin-bottom: 50px;
            padding: 20px;
            border: 2px solid var(--accent-gold);
            display: inline-block;
            position: relative;
            background: rgba(201, 162, 39, 0.05);
        }

        .discovery-title::before,
        .discovery-title::after {
            content: '◆';
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: var(--forest-green);
            font-size: 12px;
        }

        .discovery-title::before { left: -30px; }
        .discovery-title::after { right: -30px; }

        /* 黑胶唱片播放器 */
        .player-container {
            margin: 50px auto;
            position: relative;
            width: 350px;
            height: 350px;
        }

        .vinyl-record {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background:
                radial-gradient(circle at center, var(--cream) 0%, var(--cream) 8%, transparent 8%),
                radial-gradient(circle at center, transparent 25%, rgba(0,0,0,0.3) 25%, rgba(0,0,0,0.3) 26%, transparent 26%),
                repeating-radial-gradient(circle at center, var(--vinyl-black) 0%, var(--vinyl-black) 2%, #2a2a2a 2%, #2a2a2a 4%);
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 0 60px rgba(0,0,0,0.8), 0 0 100px rgba(61, 124, 85, 0.2);
        }

        .vinyl-record:hover {
            box-shadow: 0 0 80px rgba(61, 124, 85, 0.4), 0 0 120px rgba(201, 162, 39, 0.2);
        }

        .vinyl-record.playing {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* 唱片标签 */
        .vinyl-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            background: var(--forest-green);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .vinyl-label-text {
            font-size: 14px;
            letter-spacing: 4px;
            color: var(--cream);
            font-weight: bold;
        }

        .vinyl-label-sub {
            font-size: 10px;
            letter-spacing: 2px;
            color: var(--cream);
            opacity: 0.8;
            margin-top: 5px;
        }

        /* 播放按钮 */
        .play-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background: rgba(18, 18, 18, 0.9);
            border: 3px solid var(--accent-gold);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
            z-index: 10;
        }

        .play-button:hover {
            background: var(--accent-gold);
            transform: translate(-50%, -50%) scale(1.1);
        }

        .play-button::before {
            content: '▶';
            font-size: 30px;
            color: var(--accent-gold);
            margin-left: 5px;
        }

        .play-button:hover::before {
            color: var(--bg-dark);
        }

        .play-button.playing::before {
            content: '❚❚';
            font-size: 20px;
            margin-left: 0;
        }

        /* 歌曲信息 */
        .song-info {
            margin-top: 40px;
            padding: 30px;
            border: 2px solid var(--forest-green);
            background: rgba(61, 124, 85, 0.05);
            position: relative;
        }

        .song-info::before {
            content: '';
            position: absolute;
            top: -2px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--accent-gold);
        }

        .song-title {
            font-size: 24px;
            letter-spacing: 10px;
            color: var(--cream);
            margin-bottom: 15px;
        }

        .song-artist {
            font-size: 14px;
            letter-spacing: 5px;
            color: var(--forest-green);
            margin-bottom: 10px;
        }

        .song-year {
            font-size: 12px;
            letter-spacing: 3px;
            color: var(--accent-gold);
            opacity: 0.8;
        }

        /* 歌词片段 */
        .lyrics {
            margin-top: 40px;
            font-size: 14px;
            line-height: 2.5;
            color: var(--cream);
            opacity: 0.7;
            font-style: italic;
            letter-spacing: 2px;
        }

        .lyrics p {
            margin: 10px 0;
        }

        /* 返回按钮 */
        .back-btn {
            display: inline-block;
            margin-top: 50px;
            padding: 15px 40px;
            background: transparent;
            border: 2px solid var(--forest-green);
            color: var(--forest-green);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 5px;
            transition: all 0.3s;
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .back-btn:hover {
            background: var(--forest-green);
            color: var(--bg-dark);
        }

        /* 页脚 */
        .footer {
            margin-top: 60px;
            font-size: 11px;
            color: var(--forest-green);
            opacity: 0.5;
            letter-spacing: 3px;
        }

        /* 音频可视化条 */
        .visualizer {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            height: 40px;
            margin-top: 30px;
            gap: 4px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .visualizer.active {
            opacity: 1;
        }

        .bar {
            width: 4px;
            background: var(--forest-green);
            animation: equalize 1s ease-in-out infinite;
        }

        .bar:nth-child(1) { height: 20%; animation-delay: 0s; }
        .bar:nth-child(2) { height: 60%; animation-delay: 0.1s; }
        .bar:nth-child(3) { height: 40%; animation-delay: 0.2s; }
        .bar:nth-child(4) { height: 80%; animation-delay: 0.3s; }
        .bar:nth-child(5) { height: 30%; animation-delay: 0.4s; }
        .bar:nth-child(6) { height: 70%; animation-delay: 0.5s; }
        .bar:nth-child(7) { height: 50%; animation-delay: 0.6s; }
        .bar:nth-child(8) { height: 90%; animation-delay: 0.7s; }
        .bar:nth-child(9) { height: 35%; animation-delay: 0.8s; }
        .bar:nth-child(10) { height: 65%; animation-delay: 0.9s; }

        @keyframes equalize {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(0.5); }
        }
    </style>
</head>
<body>
    <div class="diagonal-tension"></div>

    <!-- 音符装饰 -->
    <div class="music-note">♪</div>
    <div class="music-note">♫</div>
    <div class="music-note">♬</div>

    <div class="container">
        <div class="discovery-title">恭喜你！发现了我写这个游戏的时候最喜欢的歌！</div>

        <div class="player-container">
            <div class="vinyl-record" id="vinyl">
                <div class="vinyl-label">
                    <div class="vinyl-label-text">杭州</div>
                    <div class="vinyl-label-sub">LIVE 2013</div>
                </div>
            </div>
            <div class="play-button" id="playBtn"></div>
        </div>

        <!-- 音频可视化 -->
        <div class="visualizer" id="visualizer">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </div>

        <div class="song-info">
            <div class="song-title">杭 州</div>
            <div class="song-artist">李 志</div>
            <div class="song-year">《我们不能失去信仰》2013版 LIVE</div>
        </div>

        <div class="lyrics">
            <p>「一首关于城市的歌」</p>
        </div>

        <a href="../../../main.html" class="back-btn">返 回 首 页</a>

        <div class="footer">© 1998 YADNUS | 音乐是解谜的奖赏</div>
    </div>

    <!-- 音频元素 -->
    <audio id="audioPlayer" preload="metadata">
        <source src="../../../audio/李志 - 杭州&我们不能失去信仰2013版LIVE.mp3" type="audio/mpeg">
    </audio>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.ProgressManager) ProgressManager.addUnlockedPage('hangzhou');

            var audio = document.getElementById('audioPlayer');
            var playBtn = document.getElementById('playBtn');
            var vinyl = document.getElementById('vinyl');
            var visualizer = document.getElementById('visualizer');

            playBtn.addEventListener('click', function() {
                if (audio.paused) {
                    audio.play();
                    playBtn.classList.add('playing');
                    vinyl.classList.add('playing');
                    visualizer.classList.add('active');
                } else {
                    audio.pause();
                    playBtn.classList.remove('playing');
                    vinyl.classList.remove('playing');
                    visualizer.classList.remove('active');
                }
            });

            // 唱片点击也可以播放
            vinyl.addEventListener('click', function() {
                playBtn.click();
            });

            // 音频结束
            audio.addEventListener('ended', function() {
                playBtn.classList.remove('playing');
                vinyl.classList.remove('playing');
                visualizer.classList.remove('active');
            });
        });
    </script>
</body>
</html>
