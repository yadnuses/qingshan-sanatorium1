<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>地下三层-实验室入口 | 青山疗养院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Courier New", monospace;
            background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
            min-height: 100vh;
            padding: 20px;
            color: #00ff00;
        }
        .lab-container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(0,20,0,0.9);
            border: 2px solid #00ff00;
            box-shadow: 0 0 30px rgba(0,255,0,0.2), inset 0 0 50px rgba(0,255,0,0.05);
            padding: 40px;
            position: relative;
        }
        .lab-container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                rgba(0,255,0,0.03) 0px,
                rgba(0,255,0,0.03) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
        }
        .lab-header {
            text-align: center;
            border-bottom: 1px solid #00ff00;
            padding-bottom: 20px;
            margin-bottom: 30px;
            position: relative;
            z-index: 1;
        }
        .lab-header h1 {
            font-size: 20px;
            letter-spacing: 5px;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0,255,0,0.5);
        }
        .lab-code {
            font-size: 12px;
            color: #00aa00;
        }
        .status-panel {
            background: rgba(0,50,0,0.3);
            border: 1px solid #00ff00;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }
        .status-line {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .status-label {
            color: #00aa00;
        }
        .status-value {
            color: #ff0000;
        }
        .status-value.unlocked {
            color: #00ff00;
        }
        .note-section {
            margin: 20px 0;
            padding: 15px;
            background: rgba(255,255,0,0.1);
            border-left: 3px solid #ffff00;
            position: relative;
            z-index: 1;
        }
        .note-title {
            color: #ffff00;
            font-size: 12px;
            margin-bottom: 8px;
        }
        .note-content {
            font-size: 14px;
            color: #cccc00;
            font-style: italic;
        }
        .password-panel {
            margin-top: 25px;
            padding: 25px;
            background: rgba(0,0,0,0.5);
            border: 1px solid #00ff00;
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .password-title {
            font-size: 14px;
            color: #00ff00;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }
        .password-display {
            font-size: 24px;
            letter-spacing: 8px;
            margin-bottom: 20px;
            color: #00ff00;
        }
        .password-input {
            background: #000;
            border: 1px solid #00ff00;
            color: #00ff00;
            padding: 12px 20px;
            font-size: 16px;
            font-family: inherit;
            text-align: center;
            width: 250px;
            letter-spacing: 2px;
        }
        .password-input:focus {
            outline: none;
            box-shadow: 0 0 15px rgba(0,255,0,0.5);
        }
        .unlock-btn {
            margin-top: 15px;
            padding: 10px 30px;
            background: #003300;
            border: 1px solid #00ff00;
            color: #00ff00;
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            letter-spacing: 3px;
        }
        .unlock-btn:hover {
            background: #00ff00;
            color: #000;
        }
        .hint-link {
            margin-top: 15px;
            font-size: 12px;
        }
        .hint-link a {
            color: #00aa00;
        }
        .hint-box {
            display: none;
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,100,0,0.2);
            font-size: 12px;
            color: #00aa00;
        }
        .result-message {
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .unlocked-panel {
            display: none;
            margin-top: 20px;
            padding: 20px;
            background: rgba(0,255,0,0.1);
            border: 1px solid #00ff00;
            position: relative;
            z-index: 1;
        }
        .unlocked-title {
            color: #00ff00;
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
        }
        .unlocked-content {
            font-size: 14px;
            line-height: 1.8;
            color: #00cc00;
        }
        .back-btn {
            display: block;
            width: 150px;
            margin: 30px auto 0;
            padding: 10px;
            background: #003300;
            border: 1px solid #00ff00;
            color: #00ff00;
            text-align: center;
            text-decoration: none;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }
        .back-btn:hover {
            background: #00ff00;
            color: #000;
        }
        .page-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: #00aa00;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="lab-container">
        <div class="lab-header">
            <h1>实 验 室 门 禁 系 统</h1>
            <div class="lab-code">地下三层 | 层级：3</div>
        </div>

        <div class="status-panel">
            <div class="status-line">
                <span class="status-label">系统状态</span>
                <span class="status-value" id="systemStatus">锁定</span>
            </div>
            <div class="status-line">
                <span class="status-label">安全等级</span>
                <span class="status-label">最高</span>
            </div>
            <div class="status-line">
                <span class="status-label">访问权限</span>
                <span class="status-value" id="accessStatus">拒绝</span>
            </div>
        </div>

        <div class="note-section">
            <div class="note-title">[便条]</div>
            <div class="note-content">
                "0317，我被带到这里的那一天"
            </div>
        </div>

        <div class="password-panel" id="passwordPanel">
            <div class="password-title">二进制密码验证</div>
            <div class="password-display">[ □□□□□□□□ □□□□□□□□ ]</div>
            <input type="text" class="password-input" id="binaryInput" placeholder="00000000 00000000" maxlength="17">
            <br>
            <button class="unlock-btn" onclick="checkPassword()">解锁</button>
            <div class="result-message" id="resultMsg"></div>
            <div class="hint-link">
                <a href="#" onclick="showHint(); return false;">[需要提示？]</a>
            </div>
            <div class="hint-box" id="hintBox">
                0317 → 00001100 01010101
            </div>
        </div>

        <div class="unlocked-panel" id="unlockedPanel">
            <div class="unlocked-title">门禁已解锁</div>
            <div class="unlocked-content">
                密码验证通过。<br>
                实验室入口已开启。<br>
                欢迎进入地下三层核心区域。<br><br>
                用户您好，欢迎访问炉鼎计划核心操作层
            </div>
        </div>

        <a href="../../../main.html" class="back-btn">返回首页</a>
    </div>

    <div class="page-footer">
        页面 27 / 50 | © 1998 YADNUS
    </div>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.ProgressManager) ProgressManager.addUnlockedPage('27');
        });

        function checkPassword() {
            var input = document.getElementById('binaryInput').value.trim();
            var result = document.getElementById('resultMsg');
            var systemStatus = document.getElementById('systemStatus');
            var accessStatus = document.getElementById('accessStatus');

            if (input === '00001100 01010101' || input === '0000110001010101') {
                document.getElementById('passwordPanel').style.display = 'none';
                document.getElementById('unlockedPanel').style.display = 'block';
                systemStatus.textContent = '已解锁';
                systemStatus.className = 'status-value unlocked';
                accessStatus.textContent = '允许';
                accessStatus.className = 'status-value unlocked';
                if (window.ProgressManager) ProgressManager.addUnlockedPage('27');
            } else {
                result.style.color = '#ff0000';
                result.textContent = '密码错误';
            }
        }

        function showHint() {
            var hintBox = document.getElementById('hintBox');
            hintBox.style.display = hintBox.style.display === 'none' ? 'block' : 'none';
        }

        document.getElementById('binaryInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });
    </script>
</body>
</html>
