<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禁止访问 | 青山疗养院</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "SimSun", "宋体", "Microsoft YaHei", sans-serif;
            background: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at center, rgba(139, 0, 0, 0.3) 0%, transparent 70%),
                repeating-linear-gradient(
                    0deg,
                    rgba(50, 0, 0, 0.3) 0px,
                    rgba(50, 0, 0, 0.3) 2px,
                    transparent 2px,
                    transparent 4px
                );
            animation: static 0.5s infinite;
        }
        @keyframes static {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.95; }
        }
        .warning-container {
            text-align: center;
            position: relative;
            z-index: 1;
            padding: 60px;
            border: 3px solid #ff0000;
            background: rgba(20, 0, 0, 0.9);
            box-shadow:
                0 0 50px rgba(255, 0, 0, 0.5),
                inset 0 0 100px rgba(139, 0, 0, 0.3);
            animation: borderPulse 1s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% {
                border-color: #ff0000;
                box-shadow: 0 0 50px rgba(255, 0, 0, 0.5), inset 0 0 100px rgba(139, 0, 0, 0.3);
            }
            50% {
                border-color: #aa0000;
                box-shadow: 0 0 80px rgba(255, 0, 0, 0.8), inset 0 0 120px rgba(139, 0, 0, 0.5);
            }
        }
        .warning-icon {
            font-size: 80px;
            color: #ff0000;
            margin-bottom: 30px;
            animation: iconShake 0.5s ease-in-out infinite;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }
        @keyframes iconShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .warning-title {
            font-size: 48px;
            color: #ff0000;
            letter-spacing: 20px;
            margin-bottom: 30px;
            text-shadow:
                0 0 10px rgba(255, 0, 0, 0.8),
                0 0 30px rgba(255, 0, 0, 0.5),
                0 0 50px rgba(255, 0, 0, 0.3);
            animation: textFlicker 0.3s infinite;
        }
        @keyframes textFlicker {
            0%, 90%, 100% { opacity: 1; }
            92% { opacity: 0.3; }
            94% { opacity: 1; }
            96% { opacity: 0.5; }
        }
        .warning-line {
            width: 80%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff0000, transparent);
            margin: 30px auto;
        }
        .warning-message {
            font-size: 18px;
            color: #cc0000;
            letter-spacing: 5px;
            line-height: 2;
            margin-bottom: 20px;
        }
        .warning-code {
            font-size: 14px;
            color: #660000;
            letter-spacing: 3px;
            margin-top: 30px;
            padding: 15px;
            border: 1px solid #330000;
            background: rgba(0, 0, 0, 0.5);
        }
        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 40px;
            background: transparent;
            color: #ff0000;
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 5px;
            border: 2px solid #ff0000;
            transition: all 0.3s;
        }
        .back-btn:hover {
            background: #ff0000;
            color: #000;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.8);
        }
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: rgba(255, 0, 0, 0.5);
            animation: scan 2s linear infinite;
            z-index: 2;
        }
        @keyframes scan {
            0% { top: -5px; }
            100% { top: 100vh; }
        }
    </style>
</head>
<body>
    <div class="scan-line"></div>

    <div class="warning-container">
        <div class="warning-title">禁 止 访 问</div>
        <div class="warning-line"></div>
        <div class="warning-message">
            您试图访问受限区域<br>
            该行为已被记录<br>
            请立即停止
        </div>
        <div class="warning-code">
            警告代码：ACCESS_DENIED_LAYER3<br>
            安全等级：最高<br>
            将实时追踪该用户访问记录
        </div>
        <a href="../../main.html" class="back-btn">立 即 返 回</a>
    </div>
</body>
</html>
