    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .glitch-container {
            width: 100%;
            text-align: center;
        }
        .glitch-line {
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 15px;
            line-height: 1.4;
            animation: flicker 0.1s infinite;
            white-space: nowrap;
        }
        .glitch-line:nth-child(odd) {
            color: #ff0000;
            text-shadow:
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 40px #ff0000,
                0 0 80px #ff0000;
        }
        .glitch-line:nth-child(even) {
            color: #000;
            background: #ff0000;
            text-shadow:
                2px 0 #000,
                -2px 0 #000,
                0 2px #000,
                0 -2px #000;
            padding: 10px 0;
        }
        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            opacity: 0.1;
            background: repeating-linear-gradient(
                0deg,
                rgba(255, 0, 0, 0.1),
                rgba(255, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: rgba(255, 0, 0, 0.3);
            animation: scan 3s linear infinite;
            pointer-events: none;
        }
        @keyframes scan {
            0% { top: -10px; }
            100% { top: 100vh; }
        }
        .back-link {
            position: fixed;
            bottom: 30px;
            color: #ff0000;
            text-decoration: none;
            font-size: 14px;
            opacity: 0.5;
            transition: opacity 0.3s;
            letter-spacing: 5px;
        }
        .back-link:hover {
            opacity: 1;
        }
        .member-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #8b0000;
            color: #ffcccc;
            border: 2px solid #ff0000;
            padding: 20px 40px;
            font-size: 16px;
            letter-spacing: 3px;
            cursor: pointer;
            text-decoration: none;
            animation: pulse 2s infinite;
            z-index: 10;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }
        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.1);
                box-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
            }
        }
        .member-btn:hover {
            background: #a00000;
        }
    </style>
</head>
