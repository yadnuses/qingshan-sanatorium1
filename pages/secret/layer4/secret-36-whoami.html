<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我是谁？</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%;
            overflow: hidden;
        }
        body {
            font-family: "SimSun", "宋体", serif;
            background: #000;
            position: relative;
        }
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }
        .whoami-text {
            position: absolute;
            font-size: 14px;
            color: #8b0000;
            opacity: 0.4;
            animation: flicker 2s ease-in-out infinite;
            user-select: none;
            white-space: nowrap;
        }
        @keyframes flicker {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.8; }
        }
        .noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.15'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 2;
            animation: noiseMove 0.5s steps(4) infinite;
        }
        @keyframes noiseMove {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-2px, 2px); }
            50% { transform: translate(2px, -2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }
        .scanline {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                transparent 50%,
                rgba(139, 0, 0, 0.08) 50%
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 3;
            animation: scanlineMove 8s linear infinite;
        }
        @keyframes scanlineMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(4px); }
        }
        .blood-drip {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 4;
        }
        .drip {
            position: absolute;
            width: 3px;
            background: linear-gradient(to bottom, #8b0000, #4a0000);
            opacity: 0.6;
            animation: dripFall 10s ease-in infinite;
        }
        @keyframes dripFall {
            0% { height: 0; opacity: 0.8; }
            80% { opacity: 0.6; }
            100% { height: 200px; opacity: 0; }
        }
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.4) 70%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 5;
        }
        .center-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            background: rgba(0, 0, 0, 0.95);
            padding: 50px 60px;
            border: 3px solid #8b0000;
            box-shadow:
                0 0 30px rgba(139, 0, 0, 0.6),
                inset 0 0 30px rgba(139, 0, 0, 0.1);
            animation: borderPulse 3s ease-in-out infinite;
        }
        @keyframes borderPulse {
            0%, 100% { border-color: #8b0000; box-shadow: 0 0 30px rgba(139, 0, 0, 0.6), inset 0 0 30px rgba(139, 0, 0, 0.1); }
            50% { border-color: #ff0000; box-shadow: 0 0 50px rgba(255, 0, 0, 0.8), inset 0 0 40px rgba(255, 0, 0, 0.2); }
        }
        .center-text {
            font-size: 48px;
            color: #ff0000;
            letter-spacing: 15px;
            text-shadow:
                0 0 10px #ff0000,
                0 0 20px #ff0000,
                0 0 40px #8b0000;
            animation: textGlitch 4s ease-in-out infinite;
        }
        @keyframes textGlitch {
            0%, 90%, 100% { transform: translate(0); filter: none; }
            91% { transform: translate(-2px, 1px); filter: hue-rotate(90deg); }
            92% { transform: translate(2px, -1px); filter: hue-rotate(-90deg); }
            93% { transform: translate(0); filter: none; }
            95% { transform: translate(1px, 1px); filter: hue-rotate(45deg); }
            96% { transform: translate(0); filter: none; }
        }
        .sub-text {
            font-size: 16px;
            color: #8b7355;
            margin-top: 25px;
            letter-spacing: 4px;
            animation: fadeInOut 3s ease-in-out infinite;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .back-link {
            display: inline-block;
            margin-top: 40px;
            padding: 12px 35px;
            border: 1px solid #8b0000;
            color: #8b0000;
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 4px;
            transition: all 0.3s;
        }
        .back-link:hover {
            background: #8b0000;
            color: #000;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.5);
        }
        .whisper {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #444;
            letter-spacing: 3px;
            z-index: 10;
            animation: whisperFade 5s ease-in-out infinite;
        }
        @keyframes whisperFade {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <div class="background-layer" id="backgroundLayer"></div>

    <div class="noise"></div>
    <div class="scanline"></div>
    <div class="blood-drip" id="bloodDrip"></div>
    <div class="vignette"></div>

    <div class="center-message">
        <div class="center-text">我是谁？</div>
        <div class="sub-text">陈婷？陈婉？还是...别的什么？</div>
        <a href="secret-36.html" class="back-link">[ 返回档案 ]</a>
    </div>

    <div class="whisper">你也在找答案吗...</div>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.ProgressManager) ProgressManager.addUnlockedPage('36-whoami');

            // Generate "我是谁？" text covering entire screen
            var container = document.getElementById('backgroundLayer');
            var text = '我是谁？';
            var count = 400;

            for (var i = 0; i < count; i++) {
                var span = document.createElement('span');
                span.className = 'whoami-text';
                span.textContent = text;

                // Random positioning to cover entire screen
                span.style.left = Math.random() * 100 + '%';
                span.style.top = Math.random() * 100 + '%';

                // Random size
                var size = 12 + Math.random() * 20;
                span.style.fontSize = size + 'px';

                // Random color variations
                var colors = ['#4a0000', '#600', '#8b0000', '#a52a2a', '#cd5c5c', '#ff0000'];
                span.style.color = colors[Math.floor(Math.random() * colors.length)];

                // Random opacity
                span.style.opacity = 0.15 + Math.random() * 0.5;

                // Random animation delay
                span.style.animationDelay = Math.random() * 3 + 's';

                // Random rotation
                span.style.transform = 'rotate(' + (Math.random() * 20 - 10) + 'deg)';

                container.appendChild(span);
            }

            // Generate blood drips
            var dripContainer = document.getElementById('bloodDrip');
            for (var j = 0; j < 8; j++) {
                var drip = document.createElement('div');
                drip.className = 'drip';
                drip.style.left = (10 + Math.random() * 80) + '%';
                drip.style.animationDelay = Math.random() * 10 + 's';
                drip.style.animationDuration = (8 + Math.random() * 6) + 's';
                dripContainer.appendChild(drip);
            }
        });
    </script>
</body>
</html>
