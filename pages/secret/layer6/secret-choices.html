<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>请选择你要怎么做 | 青山疗养院</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <link rel="stylesheet" href="../../../css/secret.css">
    <style>
        body.choice-page {
            background: #0a0a0a;
            color: #e0e0e0;
        }
        .choice-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 60px 20px;
            text-align: center;
        }
        .choice-title {
            font-size: 28px;
            color: #ff4444;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 68, 68, 0.5);
            letter-spacing: 3px;
        }
        .choice-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }
        .choice-option {
            display: block;
            padding: 25px 40px;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d0a0a 100%);
            border: 2px solid #8b0000;
            border-radius: 8px;
            color: #ff6666;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }
        .choice-option:before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 68, 68, 0.1), transparent);
            transition: left 0.5s ease;
        }
        .choice-option:hover {
            background: linear-gradient(135deg, #2d0a0a 0%, #3d1515 100%);
            border-color: #ff4444;
            box-shadow: 0 6px 25px rgba(255, 68, 68, 0.4);
            transform: translateY(-2px);
        }
        .choice-option:hover:before {
            left: 100%;
        }
        .choice-label {
            display: inline-block;
            width: 30px;
            height: 30px;
            line-height: 30px;
            border: 2px solid #ff4444;
            border-radius: 50%;
            margin-right: 15px;
            font-size: 16px;
            color: #ff4444;
        }
        .atmosphere {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(139, 0, 0, 0.05) 100%);
            z-index: -1;
        }
    </style>
</head>
<body class="choice-page">
    <div class="atmosphere"></div>

    <div class="choice-container">
        <h1 class="choice-title">请选择你要怎么做</h1>

        <div class="choice-buttons">
            <a href="secret-46.html" class="choice-option">
                <span class="choice-label">A</span>
                自我删除
            </a>

            <a href="secret-47.html" class="choice-option">
                <span class="choice-label">B</span>
                反击
            </a>

            <a href="secret-48.html" class="choice-option">
                <span class="choice-label">C</span>
                逃离
            </a>

            <a href="secret-49.html" class="choice-option">
                <span class="choice-label">D</span>
                如果你还想探求真相
            </a>
        </div>
    </div>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
</body>
</html>
