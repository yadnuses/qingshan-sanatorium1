<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>觉醒 | 青山疗养院</title>
    <link rel="stylesheet" href="../../../css/style.css">
    <style>
        body {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
        }
        .awakening-container {
            max-width: 700px;
            margin: 0 auto;
            padding: 60px 30px;
            text-align: center;
        }
        .awakening-header {
            margin-bottom: 50px;
        }
        .awakening-header h1 {
            color: #2e7d32;
            font-size: 32px;
            font-weight: 300;
            letter-spacing: 8px;
            margin-bottom: 10px;
        }
        .awakening-header .subtitle {
            color: #81c784;
            font-size: 14px;
            letter-spacing: 3px;
        }
        .awakening-content {
            background: rgba(255, 255, 255, 0.9);
            border-radius: 20px;
            padding: 50px 40px;
            box-shadow: 0 10px 40px rgba(46, 125, 50, 0.15);
            margin-bottom: 40px;
        }
        .awakening-text {
            color: #555;
            font-size: 18px;
            line-height: 2.2;
            margin-bottom: 30px;
        }
        .awakening-text p {
            margin: 20px 0;
        }
        .awakening-poem {
            color: #4caf50;
            font-style: italic;
            font-size: 16px;
            line-height: 2;
            margin: 30px 0;
            padding: 20px;
            border-left: 3px solid #a5d6a7;
            text-align: left;
            background: rgba(165, 214, 167, 0.1);
            border-radius: 0 10px 10px 0;
        }
        .final-btn {
            display: inline-block;
            background: linear-gradient(135deg, #1a0000 0%, #330000 50%, #1a0000 100%);
            color: #ff3333;
            padding: 25px 60px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border: 3px solid #8b0000;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.6), inset 0 0 20px rgba(255, 0, 0, 0.1);
            text-shadow: 0 0 10px rgba(255, 51, 51, 0.8);
            letter-spacing: 5px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .final-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.8), inset 0 0 30px rgba(255, 0, 0, 0.2);
            border-color: #ff0000;
        }
        .back-link {
            display: inline-block;
            margin-top: 30px;
            color: #81c784;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }
        .back-link:hover {
            color: #4caf50;
        }
        .leaf-decoration {
            font-size: 48px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="awakening-container">
        <div class="awakening-header">
            <div class="leaf-decoration">🌿</div>
            <h1>觉醒</h1>
            <div class="subtitle">隐藏结局 | 层级：6</div>
        </div>

        <div class="awakening-content">
            <div class="awakening-text">
                <p>系统检测到你的探索进度...</p>

                <div class="awakening-poem">
                    当你了解了所有真相，<br>
                    当你接受了自己是陈婉的事实，<br>
                    当你准备好面对最终的选择...
                </div>

                <p>一切都已清晰，一切都将结束。</p>
            </div>

            <a href="secret-50.html" class="final-btn">
                你好，再见
            </a>
        </div>

        <a href="../../../main.html" class="back-link">返回首页</a>
    </div>

    <script src="../../../js/md5.min.js"></script>
    <script src="../../../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.ProgressManager) {
                ProgressManager.addUnlockedPage('49');
                ProgressManager.unlockEnding('D');
            }
        });
    </script>
</body>
</html>

</html>
