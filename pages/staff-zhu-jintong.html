        <section>
            <div class="doctor-photo-container">

            <div class="feature-card" style="max-width: 800px; margin: 0 auto; padding: 40px;">

                <p style="line-height: 2; margin-bottom: 30px;">
                    朱晋通，现任青山疗养院康复科主任，从事母猪产科临床工作二十余年。
                </p>

                <h3 style="margin-bottom: 20px;">专业擅长</h3>
                <div class="features" style="flex-direction: column; gap: 15px;">
                    <div class="feature-card" style="text-align: left;">
                        <p>母猪围产期保健与护理</p>
                    </div>
                    <div class="feature-card" style="text-align: left;">
                        <p>母猪难产诊断与助产技术</p>
                    </div>
                    <div class="feature-card" style="text-align: left;">
                        <p>母猪产后康复及新生仔猪护理</p>
                    </div>
                    <div class="feature-card" style="text-align: left;">
                        <p>规模化猪场产科疾病防控</p>
                    </div>
                </div>

                <h3 style="margin: 30px 0 20px;">专业成就</h3>
                <p style="line-height: 2;">
                    朱主任在母猪产科领域积累了丰富的临床经验，熟练掌握人工助产、剖宫产等关键技术，成功救治难产母猪数千例，有效降低母猪围产期死亡率，提高仔猪成活率，深受养殖户信赖。
                </p>
