<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>关于我们 | 青山疗养院</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .about-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            padding: 30px 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .about-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .about-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
        }
        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 20px;
        }
        .about-card h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 20px;
        }
        .about-card p {
            color: #666;
            line-height: 1.8;
            margin-bottom: 10px;
        }
        .highlight-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .highlight-card h3,
        .highlight-card p {
            color: white;
        }
        .highlight-card .card-icon {
            background: rgba(255,255,255,0.2);
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }
        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 8px;
        }
        .stat-number {
            font-size: 32px;
            font-weight: bold;
            display: block;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.9;
        }
        .quote-card {
            border-left: 4px solid #667eea;
        }
        .quote-text {
            font-style: italic;
            font-size: 18px;
            color: #555;
            line-height: 1.6;
        }
        .quote-author {
            text-align: right;
            color: #888;
            margin-top: 15px;
        }
        .timeline-card {
            grid-column: span 2;
        }
        .timeline {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
            position: relative;
        }
        .timeline::before {
            content: '';
            position: absolute;
            top: 15px;
            left: 10%;
            right: 10%;
            height: 2px;
            background: #e0e0e0;
        }
        .timeline-item {
            text-align: center;
            position: relative;
            z-index: 1;
        }
        .timeline-dot {
            width: 30px;
            height: 30px;
            background: #667eea;
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 12px;
        }
        .timeline-year {
            font-weight: bold;
            color: #2c3e50;
        }
        .timeline-event {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        @media (max-width: 768px) {
            .timeline-card {
                grid-column: span 1;
            }
            .timeline {
                flex-direction: column;
                gap: 20px;
            }
            .timeline::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <h1>青山疗养院</h1>
            <span class="subtitle">QINGSHAN SANATORIUM</span>
        </div>
        <nav class="nav">
            <a href="../main.html">首页</a>
            <a href="./about.html">关于我们</a>
            <a href="./services.html">服务项目</a>
            <a href="./staff.html">医护团队</a>
            <a href="./contact.html">联系方式</a>
        </nav>
    </header>
    <main class="main">
        <section class="hero">
            <h2>关于青山疗养院</h2>
            <p>三十年专注老年健康管理，为您提供专业的养老康复服务</p>
        </section>

        <div class="about-grid">
            <!-- 院长致辞卡片 -->
            <div class="about-card quote-card">
                <div class="card-icon">💬</div>
                <h3>院长致辞</h3>
                <p class="quote-text">"让每一位老人都能安享晚年，是我们不变的追求。我们不仅要延长生命的长度，更要拓展生命的宽度，让每一位入住者都能有尊严、有质量地生活。"</p>
                <p class="quote-author">—— 林国栋院长</p>
            </div>

            <!-- 服务理念卡片 -->
            <div class="about-card">
                <div class="card-icon">❤️</div>
                <h3>服务理念</h3>
                <p><strong>以人为本</strong> — 尊重每一位入住者的个性与需求</p>
                <p><strong>关爱生命</strong> — 用心呵护，让晚年生活更有质量</p>
                <p><strong>专业照护</strong> — 资深医护团队，24小时贴心守护</p>
            </div>
        </div>
    </main>
    <footer class="footer">
        <p>© 1998 YADNUS 版权所有</p>
    </footer>
</body>
</html>
